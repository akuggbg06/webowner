<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Chat</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Kembali ke Home</a>
        
        <div class="header">
            <h1>💬 CHAT ZEXZO</h1>
            <p class="tagline">Pilih platform chat</p>
        </div>

        <div class="chat-options">
            <a href="https://wa.me/6281234567890" class="chat-card" id="waCard" target="_blank">
                <span>📱</span>
                <div>
                    <h3>WhatsApp</h3>
                    <p>Chat via WhatsApp</p>
                </div>
            </a>
            
            <a href="https://t.me/zexzo_example" class="chat-card" id="teleCard" target="_blank">
                <span>📞</span>
                <div>
                    <h3>Telegram</h3>
                    <p>Chat via Telegram</p>
                </div>
            </a>
        </div>

        <div class="footer-note">
            <p>✨ Edit link di folder Chat/index.html ✨</p>
        </div>
    </div>

    <style>
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #00ffcc;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0,255,200,0.1);
        }
        .chat-options {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }
        .chat-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: linear-gradient(145deg, #0a2525, #041515);
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid rgba(0,255,200,0.3);
            transition: all 0.3s;
        }
        .chat-card:hover {
            transform: translateX(10px);
            border-color: #00ffcc;
        }
        .chat-card span {
            font-size: 2.5rem;
        }
        .chat-card h3 {
            color: #00ffcc;
            margin-bottom: 5px;
        }
        .chat-card p {
            color: #88aacc;
            font-size: 0.8rem;
        }
        #waCard:hover { background: #075E54; }
        #teleCard:hover { background: #0088cc; }
    </style>
</body>
</html>
