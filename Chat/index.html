<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zexzo | Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #075E54, #128C7E);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #075E54;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            background: rgba(255,255,255,0.2);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-header .info {
            flex: 1;
        }
        .chat-header h2 {
            font-size: 1.2rem;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #25D366;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.05"><path fill="none" d="M10,50 L90,50 M50,10 L50,90" stroke="white" stroke-width="1"/><circle cx="50" cy="50" r="40" stroke="white" stroke-width="1" fill="none"/></svg>');
        }
        .message {
            display: flex;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.outgoing {
            align-self: flex-end;
        }
        .message.incoming {
            align-self: flex-start;
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
            word-wrap: break-word;
            max-width: 100%;
        }
        .outgoing .bubble {
            background: #dcf8c6;
            color: #1a2a3a;
            border-bottom-right-radius: 4px;
        }
        .incoming .bubble {
            background: white;
            color: #1a2a3a;
            border-bottom-left-radius: 4px;
        }
        .message-time {
            font-size: 0.65rem;
            color: #888;
            margin-top: 5px;
            text-align: right;
        }
        .chat-input-area {
            background: #1e2a3a;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            background: #2a3a4a;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area button {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
        }
        #buktiBtn {
            background: #ff8800;
            color: white;
        }
        #sendBtn {
            background: #25D366;
            color: white;
        }
        .owner-offline {
            text-align: center;
            padding: 10px;
            background: rgba(255,0,0,0.3);
            color: #ffaaaa;
            font-size: 0.8rem;
        }
        .footer-note {
            text-align: center;
            margin-top: 10px;
            font-size: 0.7rem;
            color: #558888;
        }
        @media (max-width: 480px) {
            .message {
                max-width: 90%;
            }
            .chat-input-area button {
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <a href="/" class="back-btn">←</a>
        <div class="info">
            <h2>Zexzo Support</h2>
            <div><span class="online-dot"></span> <span id="ownerStatusText">Online</span></div>
        </div>
        <div>🤖</div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="chat-input-area">
        <button id="buktiBtn">📸</button>
        <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
        <button id="sendBtn">📤</button>
    </div>
    <div id="offlineWarning" class="owner-offline" style="display:none;">⚠️ Owner sedang offline, coba lagi nanti ⚠️</div>
    <div class="footer-note">💡 Klik 📸 untuk upload bukti pembayaran</div>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');

        if (!token || !userId) {
            window.location.href = '/Login';
        }

        let ownerStatus = 'on';
        let lastMessageId = 0;
        let pollingInterval = null;

        async function checkOwnerStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                ownerStatus = data.status;
                const statusText = ownerStatus === 'on' ? 'Online' : 'Offline';
                document.getElementById('ownerStatusText').textContent = statusText;
                const warning = document.getElementById('offlineWarning');
                warning.style.display = ownerStatus === 'off' ? 'block' : 'none';
                const input = document.getElementById('messageInput');
                const sendBtn = document.getElementById('sendBtn');
                const buktiBtn = document.getElementById('buktiBtn');
                if (ownerStatus === 'off') {
                    input.disabled = true;
                    sendBtn.disabled = true;
                    buktiBtn.disabled = true;
                    input.placeholder = 'Owner sedang offline...';
                } else {
                    input.disabled = false;
                    sendBtn.disabled = false;
                    buktiBtn.disabled = false;
                    input.placeholder = 'Ketik pesan...';
                }
            } catch (err) {
                console.error('Gagal cek status:', err);
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(`/api/history?userId=${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.messages) {
                    const container = document.getElementById('chatContainer');
                    container.innerHTML = '';
                    data.messages.forEach(msg => {
                        appendMessage(msg, msg.sender === 'user' ? 'outgoing' : 'incoming');
                    });
                    if (data.messages.length > 0) {
                        lastMessageId = data.messages[data.messages.length - 1].id;
                    }
                    scrollToBottom();
                }
            } catch (err) {
                console.error('Gagal load history:', err);
            }
        }

        function appendMessage(msg, type) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            let content = '';
            
            if (msg.has_image && msg.image_file_id) {
                const photoUrl = `/api/get-photo?file_id=${encodeURIComponent(msg.image_file_id)}`;
                content += `<img src="${photoUrl}" class="chat-image" style="max-width:150px; max-height:150px; border-radius:10px; cursor:pointer;" onclick="window.open('${photoUrl}')">`;
            }
            
            if (msg.message && msg.message.trim()) {
                content += `<div>${escapeHtml(msg.message)}</div>`;
            }
            
            div.innerHTML = `
                <div class="bubble">
                    ${content}
                    <div class="message-time">${time}</div>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (ownerStatus === 'off') {
                alert('Owner sedang offline, coba lagi nanti');
                return;
            }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId, message: text })
                });
                const data = await res.json();
                if (data.success) {
                    startPolling();
                } else {
                    alert(data.message || 'Gagal kirim pesan');
                }
            } catch (err) {
                alert('Gagal kirim pesan');
            }
        }

        async function pollNewMessages() {
            try {
                const res = await fetch(`/api/history?userId=${userId}&after=${lastMessageId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.id > lastMessageId) {
                            appendMessage(msg, msg.sender === 'user' ? 'outgoing' : 'incoming');
                        }
                    });
                    if (data.messages.length > 0) {
                        lastMessageId = Math.max(...data.messages.map(m => m.id));
                    }
                }
            } catch (err) {
                console.error('Polling error:', err);
            }
        }

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollNewMessages, 3000);
        }

        // Tombol bukti
        document.getElementById('buktiBtn').addEventListener('click', () => {
            window.location.href = '/Bukti';
        });

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function init() {
            await checkOwnerStatus();
            await loadHistory();
            startPolling();
            setInterval(checkOwnerStatus, 10000);
        }

        init();
    </script>
</body>
</html>
