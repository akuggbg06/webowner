<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Zexzo | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Header */
        .chat-header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.05);
        }

        .info h2 {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .info p {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 2px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
            margin-right: 6px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.9); }
        }

        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.8);
            border-color: transparent;
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbar */
        .chat-container::-webkit-scrollbar {
            width: 5px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        /* Message Bubbles */
        .message {
            display: flex;
            max-width: 75%;
            animation: fadeInUp 0.3s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.outgoing {
            align-self: flex-end;
        }

        .message.incoming {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 20px;
            position: relative;
            word-wrap: break-word;
            backdrop-filter: blur(4px);
        }

        .outgoing .bubble {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .incoming .bubble {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            color: #f1f5f9;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .message-time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
        }

        /* Input Area */
        .chat-input-area {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 40px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #10b981;
            background: rgba(255,255,255,0.12);
        }

        .chat-input-area input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .btn-action {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0 20px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-action:hover {
            background: #10b981;
            border-color: #10b981;
            transform: scale(1.02);
        }

        #sendBtn {
            width: 44px;
            height: 44px;
            padding: 0;
            justify-content: center;
            background: #10b981;
            border-color: #10b981;
        }

        #sendBtn:hover {
            background: #059669;
            transform: scale(1.05);
        }

        .owner-offline {
            text-align: center;
            padding: 8px;
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            font-size: 0.75rem;
            backdrop-filter: blur(4px);
        }

        .footer-note {
            text-align: center;
            margin-top: 8px;
            font-size: 0.65rem;
            color: rgba(255,255,255,0.3);
        }

        /* Link in message */
        .bubble a {
            color: #34d399;
            text-decoration: none;
            word-break: break-all;
        }

        .bubble a:hover {
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .message {
                max-width: 85%;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .chat-input-area {
                padding: 12px 16px;
            }
            .btn-action {
                padding: 0 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="header-left">
            <a href="/" class="back-btn">←</a>
            <div class="info">
                <h2>Zexyo Support</h2>
                <p><span class="online-dot"></span> <span id="ownerStatusText">Online</span></p>
            </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="chat-input-area">
        <button class="btn-action" id="buktiBtn">📄 Kirim Bukti</button>
        <input type="text" id="messageInput" placeholder="Ketik pesan..." autocomplete="off">
        <button class="btn-action" id="sendBtn">✈️</button>
    </div>
    <div id="offlineWarning" class="owner-offline" style="display:none;">⚠️ Owner sedang offline, pesan tidak akan terkirim ⚠️</div>
    <div class="footer-note">💡 Klik "Kirim Bukti" untuk upload bukti pembayaran</div>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');

        if (!token || !userId) {
            window.location.href = '/Login';
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('userId');
            window.location.href = '/Login';
        });

        let ownerStatus = 'on';
        let lastMessageId = 0;
        let pollingInterval = null;

        async function checkOwnerStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                ownerStatus = data.status;
                const statusText = ownerStatus === 'on' ? 'Online' : 'Offline';
                document.getElementById('ownerStatusText').textContent = statusText;
                const warning = document.getElementById('offlineWarning');
                warning.style.display = ownerStatus === 'off' ? 'block' : 'none';
                const input = document.getElementById('messageInput');
                const sendBtn = document.getElementById('sendBtn');
                const buktiBtn = document.getElementById('buktiBtn');
                if (ownerStatus === 'off') {
                    input.disabled = true;
                    sendBtn.disabled = true;
                    buktiBtn.disabled = true;
                    input.placeholder = 'Owner sedang offline...';
                } else {
                    input.disabled = false;
                    sendBtn.disabled = false;
                    buktiBtn.disabled = false;
                    input.placeholder = 'Ketik pesan...';
                }
            } catch (err) {
                console.error('Gagal cek status:', err);
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch(`/api/history?userId=${userId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.messages) {
                    const container = document.getElementById('chatContainer');
                    container.innerHTML = '';
                    data.messages.forEach(msg => {
                        appendMessage(msg, msg.sender === 'user' ? 'outgoing' : 'incoming');
                    });
                    if (data.messages.length > 0) {
                        lastMessageId = data.messages[data.messages.length - 1].id;
                    }
                    scrollToBottom();
                }
            } catch (err) {
                console.error('Gagal load history:', err);
            }
        }

        function appendMessage(msg, type) {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            let content = '';
            if (msg.message && msg.message.trim()) {
                let messageText = escapeHtml(msg.message);
                if (messageText.match(/^https?:\/\//i)) {
                    content = `<div><a href="${messageText}" target="_blank" rel="noopener noreferrer">🔗 ${messageText}</a></div>`;
                } else {
                    content = `<div>${messageText}</div>`;
                }
            }
            
            div.innerHTML = `
                <div class="bubble">
                    ${content}
                    <div class="message-time">${time}</div>
                </div>
            `;
            container.appendChild(div);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            const container = document.getElementById('chatContainer');
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            if (ownerStatus === 'off') {
                alert('Owner sedang offline, coba lagi nanti');
                return;
            }
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';

            try {
                const res = await fetch('/api/send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ userId, message: text })
                });
                const data = await res.json();
                if (data.success) {
                    startPolling();
                } else {
                    alert(data.message || 'Gagal kirim pesan');
                }
            } catch (err) {
                alert('Gagal kirim pesan');
            }
        }

        async function pollNewMessages() {
            try {
                const res = await fetch(`/api/history?userId=${userId}&after=${lastMessageId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (data.success && data.messages && data.messages.length > 0) {
                    data.messages.forEach(msg => {
                        if (msg.id > lastMessageId) {
                            appendMessage(msg, msg.sender === 'user' ? 'outgoing' : 'incoming');
                        }
                    });
                    if (data.messages.length > 0) {
                        lastMessageId = Math.max(...data.messages.map(m => m.id));
                    }
                }
            } catch (err) {
                console.error('Polling error:', err);
            }
        }

        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(pollNewMessages, 3000);
        }

        // Tombol bukti
        document.getElementById('buktiBtn').addEventListener('click', () => {
            window.location.href = '/Bukti';
        });

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function init() {
            await checkOwnerStatus();
            await loadHistory();
            startPolling();
            setInterval(checkOwnerStatus, 10000);
        }

        init();
    </script>
</body>
</html>
