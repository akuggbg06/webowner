<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Upload Bukti</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .upload-area {
            border: 2px dashed rgba(0,255,200,0.3);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: #00ffcc;
            background: rgba(0,255,200,0.05);
        }
        .preview-img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .keterangan {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,200,0.3);
            color: white;
            margin-bottom: 20px;
        }
        .info-text {
            background: rgba(0,50,50,0.5);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #88ffdd;
        }
        .back-chat {
            display: inline-block;
            margin-top: 20px;
            color: #00ffcc;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 UPLOAD BUKTI</h1>
            <p class="tagline">Upload bukti transfer / pembayaran</p>
        </div>

        <div class="info-text">
            ⚠️ Upload bukti pembayaran atau transfer kamu di sini.<br>
            Foto akan langsung dikirim ke admin via Telegram.
        </div>

        <div class="upload-area" id="uploadArea">
            📁 Klik atau drag & drop foto di sini<br>
            <small>Maksimal 15MB (JPG, PNG, GIF)</small>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        
        <div id="preview" style="text-align:center"></div>
        
        <textarea id="keterangan" class="keterangan" rows="3" placeholder="Tambahkan keterangan (opsional)..."></textarea>
        
        <button id="uploadBtn" class="btn btn-chat" style="width:100%" disabled>📤 Upload Bukti</button>
        
        <a href="/Chat" class="back-chat">← Kembali ke Chat</a>
        
        <div id="statusMsg" class="footer-note" style="margin-top:20px"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        
        if (!token || !userId) {
            window.location.href = '/Login';
        }
        
        let selectedFile = null;
        
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const keterangan = document.getElementById('keterangan');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // Drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#00ffcc';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = 'rgba(0,255,200,0.3)';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = 'rgba(0,255,200,0.3)';
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            } else {
                alert('Hanya file gambar yang diperbolehkan!');
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            if (file.size > 15 * 1024 * 1024) {
                alert('Ukuran foto maksimal 15MB!');
                return;
            }
            
            selectedFile = file;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.innerHTML = `<img src="${event.target.result}" class="preview-img"><br><small>${file.name}</small>`;
                uploadBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }
        
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Mengirim...';
            statusMsg.style.color = '#88ffdd';
            statusMsg.textContent = 'Mengirim bukti ke admin...';
            
            const formData = new FormData();
            formData.append('photo', selectedFile);
            formData.append('keterangan', keterangan.value);
            formData.append('userId', userId);
            
            try {
                const res = await fetch('/api/upload-bukti', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });
                
                const data = await res.json();
                
                if (data.success) {
                    statusMsg.style.color = '#66ff66';
                    statusMsg.textContent = '✅ Bukti berhasil dikirim! Redirect ke chat...';
                    setTimeout(() => {
                        window.location.href = '/Chat';
                    }, 2000);
                } else {
                    statusMsg.style.color = '#ff6666';
                    statusMsg.textContent = data.message || 'Gagal mengirim bukti';
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = '📤 Upload Bukti';
                }
            } catch (err) {
                statusMsg.style.color = '#ff6666';
                statusMsg.textContent = 'Terjadi kesalahan, coba lagi';
                uploadBtn.disabled = false;
                uploadBtn.textContent = '📤 Upload Bukti';
            }
        });
    </script>
</body>
</html>
