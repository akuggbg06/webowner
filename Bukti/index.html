<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Kirim Bukti</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .info-text {
            background: rgba(0,50,50,0.5);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #88ffdd;
        }
        .link-input {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,200,0.3);
            color: white;
            margin-bottom: 20px;
            font-family: inherit;
        }
        .keterangan {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(0,255,200,0.3);
            color: white;
            margin-bottom: 20px;
            font-family: inherit;
            resize: vertical;
        }
        .back-chat {
            display: inline-block;
            margin-top: 20px;
            color: #00ffcc;
            text-decoration: none;
        }
        .example {
            font-size: 0.7rem;
            color: #88aacc;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 KIRIM BUKTI</h1>
            <p class="tagline">Kirim bukti transfer / pembayaran</p>
        </div>

        <div class="info-text">
            ⚠️ Upload bukti dengan cara:<br>
            1. Upload foto ke <strong>imgur.com</strong> atau <strong>postimage.io</strong><br>
            2. Copy link gambarnya<br>
            3. Paste link di bawah
        </div>

        <input type="text" id="linkFoto" class="link-input" placeholder="Masukkan link foto (https://...jpg atau ...png)">
        <div class="example">Contoh: https://i.imgur.com/xxxxx.jpg</div>
        
        <textarea id="keterangan" class="keterangan" rows="3" placeholder="Tambahkan keterangan (opsional)..."></textarea>
        
        <button id="kirimBtn" class="btn btn-chat" style="width:100%">📤 Kirim Bukti</button>
        
        <a href="/Chat" class="back-chat">← Kembali ke Chat</a>
        
        <div id="statusMsg" class="footer-note" style="margin-top:20px"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        
        if (!token || !userId) {
            window.location.href = '/Login';
        }
        
        const linkFoto = document.getElementById('linkFoto');
        const keterangan = document.getElementById('keterangan');
        const kirimBtn = document.getElementById('kirimBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        kirimBtn.addEventListener('click', async () => {
            const link = linkFoto.value.trim();
            
            if (!link) {
                statusMsg.style.color = '#ff6666';
                statusMsg.textContent = 'Masukkan link foto!';
                return;
            }
            
            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                statusMsg.style.color = '#ff6666';
                statusMsg.textContent = 'Link harus dimulai dengan http:// atau https://';
                return;
            }
            
            kirimBtn.disabled = true;
            kirimBtn.textContent = 'Mengirim...';
            statusMsg.style.color = '#88ffdd';
            statusMsg.textContent = 'Mengirim bukti ke admin...';
            
            try {
                const res = await fetch('/api/kirim-bukti', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        link: link,
                        keterangan: keterangan.value
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    statusMsg.style.color = '#66ff66';
                    statusMsg.textContent = '✅ Bukti berhasil dikirim! Redirect ke chat...';
                    setTimeout(() => {
                        window.location.href = '/Chat';
                    }, 2000);
                } else {
                    statusMsg.style.color = '#ff6666';
                    statusMsg.textContent = data.message || 'Gagal mengirim bukti';
                    kirimBtn.disabled = false;
                    kirimBtn.textContent = '📤 Kirim Bukti';
                }
            } catch (err) {
                statusMsg.style.color = '#ff6666';
                statusMsg.textContent = 'Terjadi kesalahan: ' + err.message;
                kirimBtn.disabled = false;
                kirimBtn.textContent = '📤 Kirim Bukti';
            }
        });
    </script>
</body>
</html>
