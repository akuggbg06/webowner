<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo Web | Jasa Gendong</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="glow-effect"></div>
        
        <div class="header">
            <h1>✨ ZEXZO ✨</h1>
            <p class="tagline">Your Digital Partner</p>
        </div>

        <!-- Kotak Jasgen -->
        <div class="card jasgen-card">
            <div class="card-icon">📦</div>
            <h2>Jasgen</h2>
            <p class="jasgen-desc">Jasgen: <strong>Jasa Gendong</strong><br>
            1 bintang = 1k / 1000<br>
            Cepat, aman, terpercaya! 🚀</p>
            <div class="badge">⭐ 1 bintang = Rp 1.000</div>
        </div>

        <!-- Tombol-tombol utama -->
        <div class="btn-group">
            <button class="btn btn-jasgen" id="btnJasgen">
                <span class="btn-icon">💼</span> Jasgen
            </button>
            <button class="btn btn-chat" id="btnChat">
                <span class="btn-icon">💬</span> Chat Zexzo
            </button>
            <button class="btn btn-sosmed" id="btnSosmed">
                <span class="btn-icon">📱</span> Sosial Media Zexzo
            </button>
        </div>

        <!-- Sosial Media Links -->
        <div class="sosmed-section">
            <h3>📢 Sosial Media</h3>
            <div class="sosmed-grid" id="sosmedGrid">
                <a href="#" id="teleLink" class="sosmed-item tele">
                    <span>📞</span> Telegram
                </a>
                <a href="#" id="tiktokLink" class="sosmed-item tiktok">
                    <span>🎵</span> TikTok
                </a>
                <!-- Tambah sosial media lain di sini (copy 2 baris di atas) -->
            </div>
        </div>

        <div class="footer-note">
            <p>⚡ Edit link sosial media di file <code>script.js</code></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
