<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <div class="header">
            <h1>✨ ZEXZO ✨</h1>
            <p class="tagline">Your Digital Partner</p>
        </div>

        <div class="card jasgen-card">
            <div class="card-icon">📦</div>
            <h2>Jasgen</h2>
            <p class="jasgen-desc">Jasgen: <strong>Jasa Gendong</strong><br>
            1 bintang = 1k / 1000<br>
            Cepat, aman, terpercaya! 🚀</p>
            <div class="badge">⭐ 1 bintang = Rp 1.000</div>
        </div>

        <div class="btn-group">
            <a href="/Chat" class="btn btn-jasgen">
                <span class="btn-icon">💼</span> Jasgen
            </a>
            <a href="/Chat" class="btn btn-chat">
                <span class="btn-icon">💬</span> Chat Zexzo
            </a>
            <a href="/Sosial-Media" class="btn btn-sosmed">
                <span class="btn-icon">📱</span> Sosial Media Zexzo
            </a>
        </div>

        <div class="footer-note">
            <p>⚡ Klik tombol untuk pindah halaman</p>
        </div>

</html>
