<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Jasa Gendong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a2a3e 50%, #0a1a1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(10, 20, 30, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 50px;
            padding: 40px 30px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 20px rgba(0,255,200,0.2);
            border: 1px solid rgba(0,255,200,0.3);
            text-align: center;
        }

        /* Avatar/Logo */
        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #00ffcc, #0066ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 0 30px rgba(0,255,200,0.4);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ffcc, #00ccff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }

        .tagline {
            color: #88ffdd;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .price {
            background: rgba(255,100,0,0.2);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            color: #ffaa66;
            margin-bottom: 30px;
        }

        /* Kotak Jasgen */
        .jasgen-box {
            background: linear-gradient(135deg, rgba(0,50,50,0.5), rgba(0,20,20,0.5));
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,255,200,0.3);
        }

        .jasgen-box h2 {
            color: #00ffcc;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .jasgen-box p {
            color: #bbffee;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .star {
            color: #ffcc00;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Tombol */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 14px 20px;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
        }

        .btn-chat {
            background: linear-gradient(90deg, #25D366, #128C7E);
            color: white;
        }

        .btn-sosmed {
            background: linear-gradient(90deg, #aa44ff, #6611cc);
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        .footer {
            font-size: 0.7rem;
            color: #558888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>ZEXZO</h1>
        <div class="tagline">Your Digital Partner</div>
        <div class="price">⭐ 1 Bintang = 1.000 ⭐</div>

        <div class="jasgen-box">
            <h2>📦 Jasgen</h2>
            <p><strong>Jasa Gendong</strong><br>
            Cepat, Aman, Terpercaya<br>
            Bisa order kapan aja!</p>
            <div class="star">★★★★★</div>
        </div>

        <div class="btn-group">
            <a href="/Chat" class="btn btn-chat">
                💬 Chat Admin
            </a>
            <a href="https://t.me/zexzo_example" class="btn btn-sosmed">
                📱 Sosial Media
            </a>
        </div>

        <div class="footer">
            ⚡ Login dulu ya biar bisa chat
        </div>
    </div>
</body>
</html>
