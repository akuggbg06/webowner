<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Sosial Media</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Kembali ke Home</a>
        
        <div class="header">
            <h1>📱 SOSIAL MEDIA</h1>
            <p class="tagline">Ikuti kami</p>
        </div>

        <div class="sosmed-list">
            <a href="https://t.me/zexzo_example" class="sosmed-card" id="teleSosmed" target="_blank">
                <span>📞</span>
                <div>
                    <h3>Telegram</h3>
                    <p>@zexzo_example</p>
                </div>
                <span class="arrow">→</span>
            </a>
            
            <a href="https://tiktok.com/@zexzo_example" class="sosmed-card" id="tiktokSosmed" target="_blank">
                <span>🎵</span>
                <div>
                    <h3>TikTok</h3>
                    <p>@zexzo_example</p>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>

        <div class="footer-note">
            <p>✨ Edit link di folder Sosial-Media/index.html ✨</p>
        </div>
    </div>

    <style>
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #00ffcc;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(0,255,200,0.1);
        }
        .sosmed-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .sosmed-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 18px 20px;
            background: linear-gradient(145deg, #0a2525, #041515);
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid rgba(0,255,200,0.3);
            transition: all 0.3s;
        }
        .sosmed-card:hover {
            transform: translateX(10px);
            border-color: #00ffcc;
        }
        .sosmed-card span:first-child {
            font-size: 2rem;
        }
        .sosmed-card h3 {
            color: #00ffcc;
            margin-bottom: 5px;
        }
        .sosmed-card p {
            color: #88aacc;
            font-size: 0.8rem;
        }
        .arrow {
            margin-left: auto;
            font-size: 1.5rem;
            color: #00ffcc;
        }
        #teleSosmed:hover { background: #0088cc; }
        #tiktokSosmed:hover { background: #000000; }
    </style>
</body>
</html>
