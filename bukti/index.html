<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zexzo | Kirim Bukti</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #a5f3fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin-bottom: 28px;
            border-left: 3px solid #10b981;
            padding-left: 12px;
        }

        .info-box {
            background: rgba(16, 185, 129, 0.1);
            padding: 18px;
            border-radius: 24px;
            margin-bottom: 28px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .info-box p {
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .step {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 18px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .step-number {
            background: #10b981;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .link-input, .keterangan {
            width: 100%;
            padding: 14px 16px;
            border-radius: 24px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .link-input:focus, .keterangan:focus {
            outline: none;
            border-color: #10b981;
            background: rgba(0,0,0,0.6);
        }

        .example {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
            margin-top: -12px;
            margin-bottom: 20px;
        }

        .btn-catbox {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            text-align: center;
            display: block;
            text-decoration: none;
            color: white;
            font-weight: 600;
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        .btn-catbox:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            transform: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 0.8rem;
        }

        .back-link:hover {
            color: #10b981;
        }

        .status-msg {
            margin-top: 16px;
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📸 Kirim Bukti</h1>
        <div class="tagline">Upload & kirim bukti pembayaran</div>

        <div class="info-box">
            <p>📋 <strong>Cara upload bukti:</strong></p>
            <div class="step"><span class="step-number">1</span> Buka <strong>files.catbox.moe</strong></div>
            <div class="step"><span class="step-number">2</span> Klik "Select files" → pilih foto</div>
            <div class="step"><span class="step-number">3</span> Copy link hasil upload</div>
            <div class="step"><span class="step-number">4</span> Paste link di bawah → Kirim</div>
        </div>

        <a href="https://files.catbox.moe" target="_blank" class="btn-catbox">
            🔗 Buka Catbox.moe (Upload Foto)
        </a>

        <input type="text" id="linkFoto" class="link-input" placeholder="Paste link dari Catbox">
        <div class="example">Contoh: https://files.catbox.moe/abc123.jpg</div>
        
        <textarea id="keterangan" class="keterangan" rows="3" placeholder="Keterangan (opsional) contoh: Bukti transfer Zexzo"></textarea>
        
        <button id="kirimBtn" class="btn-primary">✈️ Kirim Bukti ke Admin</button>
        
        <a href="/chat" class="back-link">← Kembali ke Chat</a>
        
        <div id="statusMsg" class="status-msg"></div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        
        if (!token || !userId) {
            window.location.href = '/Login';
        }
        
        const linkFoto = document.getElementById('linkFoto');
        const keterangan = document.getElementById('keterangan');
        const kirimBtn = document.getElementById('kirimBtn');
        const statusMsg = document.getElementById('statusMsg');
        
        kirimBtn.addEventListener('click', async () => {
            let link = linkFoto.value.trim();
            
            if (!link) {
                statusMsg.style.color = '#f87171';
                statusMsg.textContent = '❌ Masukkan link foto dari Catbox!';
                return;
            }
            
            if (!link.startsWith('http')) {
                link = 'https://files.catbox.moe/' + link.replace(/^\/+/, '');
            }
            
            if (!link.includes('files.catbox.moe')) {
                statusMsg.style.color = '#f87171';
                statusMsg.textContent = '❌ Link harus dari files.catbox.moe!';
                return;
            }
            
            kirimBtn.disabled = true;
            kirimBtn.textContent = 'Mengirim...';
            statusMsg.style.color = '#6ee7b7';
            statusMsg.textContent = 'Mengirim bukti ke admin...';
            
            try {
                const res = await fetch('/api/kirim-bukti', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        link: link,
                        keterangan: keterangan.value
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    statusMsg.style.color = '#6ee7b7';
                    statusMsg.textContent = '✅ Bukti berhasil dikirim! Redirect ke chat...';
                    setTimeout(() => {
                        window.location.href = '/chat';
                    }, 2000);
                } else {
                    statusMsg.style.color = '#f87171';
                    statusMsg.textContent = data.message || 'Gagal mengirim bukti';
                    kirimBtn.disabled = false;
                    kirimBtn.textContent = '✈️ Kirim Bukti ke Admin';
                }
            } catch (err) {
                statusMsg.style.color = '#f87171';
                statusMsg.textContent = '❌ Terjadi kesalahan, coba lagi';
                kirimBtn.disabled = false;
                kirimBtn.textContent = '✈️ Kirim Bukti ke Admin';
            }
        });
    </script>
</body>
</html>
